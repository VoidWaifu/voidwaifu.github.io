<body>

    <main>
        <div class="container">

        <button class="control-btn" id="copy-timestamp-btn">Скопировать ID</button>

        <button class="control-btn" id="copy-post-btn">Скопировать пост</button>
        <button class="control-btn" id="copy-js-btn">Скопировать JS</button>
        <button class="control-btn" id="open-settings-btn">Настройки ленты</button>

    <div id="feed-modal">
        <div class="modal-content">
            <h2>Настройки для ленты</h2>
            <div class="modal-group">
                <label for="feed-title">Заголовок в ленте</label>
                <input type="text" id="feed-title" placeholder="Заголовок карточки...">
            </div>
            <div class="modal-group">
                <label for="feed-desc">Описание в ленте</label>
                <textarea id="feed-desc" rows="4" placeholder="Краткое описание..."></textarea>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="control-btn" id="close-modal-btn">Сохранить и закрыть</button>
            </div>
        </div>
    </div>

    <script>
        let timestamp = Math.floor(Date.now() / 1000);
        let dateObj = new Date(timestamp * 1000);

        const timestampDisplay = document.getElementById('timestamp-display');
        const dateDisplay = document.getElementById('publish-date');
        const editor = document.getElementById('editor');
        const placeholder = document.getElementById('editor-placeholder');
        const notification = document.getElementById('notification');
        const titleInput = document.getElementById('title-input');
        const toolbarPanel = document.getElementById('toolbar-panel');
        const boldBtn = document.getElementById('bold-btn');
        const underlineBtn = document.getElementById('underline-btn');

        titleInput.value = '';
        editor.innerHTML = '';

        timestampDisplay.textContent = timestamp;

        const dateFormatter = new Intl.DateTimeFormat('ru-RU', {
            day: 'numeric',
            month: 'long',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
        dateDisplay.textContent = dateFormatter.format(dateObj);

        function showNotification(text) {
            notification.textContent = text;
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 2000);
        }

        function updatePlaceholder() {
            const hasContent = editor.textContent.trim() !== '';
            if (hasContent) {
                placeholder.classList.remove('show');
            } else {
                placeholder.classList.add('show');
            }
        }

        function updateButtonStates() {
            try {
                if (document.queryCommandState('bold')) {
                    boldBtn.classList.add('active');
                } else {
                    boldBtn.classList.remove('active');
                }
                if (document.queryCommandState('underline')) {
                    underlineBtn.classList.add('active');
                } else {
                    underlineBtn.classList.remove('active');
                }
            } catch (e) {}
        }

        document.addEventListener('selectionchange', () => {
            if (document.activeElement === editor || document.activeElement.closest('#editor')) {
                updateButtonStates();
            }
        });

        editor.addEventListener('keyup', updateButtonStates);
        editor.addEventListener('mouseup', updateButtonStates);
        editor.addEventListener('click', updateButtonStates);
        editor.addEventListener('focus', updateButtonStates);

        document.querySelector('.article-header h1').addEventListener('click', () => {
            titleInput.focus();
        });

        document.execCommand('defaultParagraphSeparator', false, 'div');

        function checkCurrentLineStyle() {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;

            const range = selection.getRangeAt(0);
            let node = range.startContainer;

            while (node && node !== editor && node.nodeName !== 'DIV') {
                node = node.parentNode;
            }

            if (node === editor) {
                if (editor.firstChild && editor.firstChild.nodeType === Node.TEXT_NODE) {
                    const textContent = editor.firstChild.textContent;
                    const newDiv = document.createElement('div');
                    newDiv.textContent = textContent;
                    editor.replaceChild(newDiv, editor.firstChild);

                    const newRange = document.createRange();
                    newRange.selectNodeContents(newDiv);
                    newRange.collapse(false);
                    selection.removeAllRanges();
                    selection.addRange(newRange);

                    node = newDiv;
                } else if (editor.firstChild && editor.firstChild.nodeName === 'BR') {
                    const newDiv = document.createElement('div');
                    newDiv.appendChild(document.createElement('br'));
                    editor.replaceChild(newDiv, editor.firstChild);
                    node = newDiv;
                }
            }

            if (node && node.nodeName === 'DIV') {
                const text = node.textContent;
                if (text.startsWith('#')) {
                    if (!node.classList.contains('editor-h2-style')) {
                        node.classList.add('editor-h2-style');
                    }
                } else {
                    if (node.classList.contains('editor-h2-style')) {
                        node.classList.remove('editor-h2-style');
                    }
                }
            }
        }

        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                setTimeout(() => {
                    checkCurrentLineStyle();
                    updatePlaceholder();
                }, 0);
            }
        });

        editor.addEventListener('input', () => {
            checkCurrentLineStyle();
            updatePlaceholder();
        });

        editor.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text');
            document.execCommand('insertText', false, text);
            updatePlaceholder();
        });

        editor.addEventListener('focus', updatePlaceholder);
        editor.addEventListener('blur', updatePlaceholder);

        updatePlaceholder();

        boldBtn.addEventListener('click', () => {
            document.execCommand('bold');
            editor.focus();
            updateButtonStates();
        });

        underlineBtn.addEventListener('click', () => {
            document.execCommand('underline');
            editor.focus();
            updateButtonStates();
        });

        document.getElementById('link-btn').addEventListener('click', () => {
            const selection = window.getSelection();
            if (selection.rangeCount) {
                const selectedText = selection.toString();
                if (selectedText.trim() !== '') {
                    const url = prompt('Введите URL ссылки:', 'https://');
                    if (url) {
                        document.execCommand('createLink', false, url);
                        const range = selection.getRangeAt(0);
                        const commonAncestor = range.commonAncestorContainer;
                        let linkEl = null;
                        if (commonAncestor.nodeType === Node.TEXT_NODE) {
                            linkEl = commonAncestor.parentNode;
                        } else {
                            const links = commonAncestor.querySelectorAll('a');
                            for (const l of links) {
                                if (selection.containsNode(l, true)) {
                                    linkEl = l;
                                    break;
                                }
                            }
                            if (!linkEl && commonAncestor.nodeName === 'A') {
                                linkEl = commonAncestor;
                            }
                        }
                        if (linkEl && linkEl.nodeName === 'A') {
                            linkEl.setAttribute('target', '_blank');
                            linkEl.setAttribute('rel', 'noopener noreferrer');
                        }
                    }
                } else {
                    const url = prompt('Введите URL ссылки:', 'https://');
                    if (url) {
                        const linkText = url;
                        document.execCommand('insertHTML', false, '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + linkText + '</a>');
                    }
                }
                editor.focus();
            }
        });

        function insertImageFromFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const dataUrl = e.target.result;
                const img = document.createElement('img');
                img.src = dataUrl;
                img.style.display = 'block';
                img.style.margin = '0.5rem auto';
                img.style.maxWidth = '100%';
                img.style.height = 'auto';
                img.style.borderRadius = '6px';

                const sel = window.getSelection();
                if (sel.rangeCount) {
                    const range = sel.getRangeAt(0);
                    range.deleteContents();
                    range.insertNode(img);
                    const newRange = document.createRange();
                    newRange.setStartAfter(img);
                    newRange.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(newRange);
                } else {
                    editor.appendChild(img);
                }
                editor.focus();
                updatePlaceholder();
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('image-btn').addEventListener('click', () => {
            const choice = prompt('Введите URL изображения или оставьте пустым для загрузки с компьютера:');
            if (choice === null) return;
            if (choice.trim() !== '') {
                const img = document.createElement('img');
                img.src = choice.trim();
                img.style.display = 'block';
                img.style.margin = '0.5rem auto';
                img.style.maxWidth = '100%';
                img.style.height = 'auto';
                img.style.borderRadius = '6px';

                const sel = window.getSelection();
                if (sel.rangeCount) {
                    const range = sel.getRangeAt(0);
                    range.deleteContents();
                    range.insertNode(img);
                    const newRange = document.createRange();
                    newRange.setStartAfter(img);
                    newRange.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(newRange);
                } else {
                    editor.appendChild(img);
                }
                editor.focus();
                updatePlaceholder();
            } else {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = function() {
                    if (this.files && this.files[0]) {
                        insertImageFromFile(this.files[0]);
                    }
                };
                input.click();
            }
        });

        editor.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
        });

        editor.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const files = e.dataTransfer.files;
            if (files && files.length) {
                let range = null;
                if (document.caretRangeFromPoint) {
                    range = document.caretRangeFromPoint(e.clientX, e.clientY);
                } else if (document.caretPositionFromPoint) {
                    const pos = document.caretPositionFromPoint(e.clientX, e.clientY);
                    if (pos) {
                        range = document.createRange();
                        range.setStart(pos.offsetNode, pos.offset);
                        range.collapse(true);
                    }
                }
                if (!range) {
                    range = document.createRange();
                    range.selectNodeContents(editor);
                    range.collapse(false);
                }
                const sel = window.getSelection();

                if (currentParagraph.length > 0) {

                    currentParagraph = [];
                }
            }

            function processInnerHTML(html) {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                const imgs = tempDiv.querySelectorAll('img');
                imgs.forEach(img => {
                    img.removeAttribute('data-filename');
                    img.style.display = 'block';

                const links = tempDiv.querySelectorAll('a');
                links.forEach(link => {
                    link.setAttribute('target', '_blank');
                    link.setAttribute('rel', 'noopener noreferrer');
                });
                return tempDiv.innerHTML;
            }

            for (let node of children) {
                if (node.nodeType === Node.ELEMENT_NODE && node.tagName === 'DIV') {
                    const innerHTML = node.innerHTML.trim();
                    if (node.classList.contains('editor-h2-style')) {
                        flushParagraph();
                        const headingHTML = innerHTML.replace(/^#\s*/, '');
                        htmlOutput += '<h2 style="text-align: center;">' + processInnerHTML(headingHTML) + '</h2>\n';
                    } else if (innerHTML === '' || innerHTML === '<br>') {

                    } else {

                    }
                }
            }
